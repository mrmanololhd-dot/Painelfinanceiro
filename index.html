<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Financeiro</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#ffffff;--bg2:#f6f6f4;--bg3:#f0efec;
  --text:#1a1a18;--text2:#6b6b66;--text3:#9b9b96;
  --border:rgba(0,0,0,0.1);--border2:rgba(0,0,0,0.18);
  --radius:8px;--radius-lg:12px;
  --green:#27500A;--green-bg:#EAF3DE;--green-border:#97C459;
  --amber:#633806;--amber-bg:#FAEEDA;--amber-border:#EF9F27;
  --red:#791F1F;--red-bg:#FCEBEB;--red-border:#F09595;
  --teal:#085041;--teal-bg:#E1F5EE;--teal-border:#5DCAA5;
  --purple:#3C3489;--purple-bg:#EEEDFE;--purple-border:#AFA9EC;
  --blue:#185FA5;--blue-bg:#E3EFFE;--blue-border:#85B7EB;
  --accent:#639922;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg3);color:var(--text);min-height:100vh}
.container{max-width:1020px;margin:0 auto;padding:24px 20px 60px}
.header{padding:0 0 20px;border-bottom:0.5px solid var(--border);margin-bottom:24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.header-left{display:flex;align-items:center;gap:10px}
.logo{width:32px;height:32px;background:var(--green-bg);border-radius:8px;display:flex;align-items:center;justify-content:center;border:0.5px solid var(--green-border)}
.logo i{color:var(--green);font-size:16px}
.header h1{font-size:17px;font-weight:600}
.header-sub{font-size:12px;color:var(--text2);margin-top:2px}
.nav{display:flex;gap:3px;background:var(--bg2);border-radius:var(--radius-lg);padding:4px;margin-bottom:24px;border:0.5px solid var(--border);overflow-x:auto}
.nav-btn{flex:1;padding:9px 6px;border:none;background:none;font-size:11.5px;font-weight:500;color:var(--text2);border-radius:var(--radius);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px;white-space:nowrap;transition:background .15s,color .15s;min-width:70px}
.nav-btn.active{background:var(--bg);color:var(--text);border:0.5px solid var(--border)}
.nav-btn i{font-size:13px}
.section{display:none}.section.active{display:block}
.kpi-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:14px}
.kpi-grid-5{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:10px;margin-bottom:14px}
@media(max-width:700px){.kpi-grid,.kpi-grid-5{grid-template-columns:repeat(2,minmax(0,1fr))}}
.kpi{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:13px 15px}
.kpi.accent{background:var(--green-bg);border-color:var(--green-border)}
.kpi.warn{background:var(--amber-bg);border-color:var(--amber-border)}
.kpi.danger{background:var(--red-bg);border-color:var(--red-border)}
.kpi.info{background:var(--blue-bg);border-color:var(--blue-border)}
.kpi-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.7px;color:var(--text2);margin-bottom:5px}
.kpi.accent .kpi-label{color:var(--green)}.kpi.warn .kpi-label{color:var(--amber)}.kpi.danger .kpi-label{color:var(--red)}.kpi.info .kpi-label{color:var(--blue)}
.kpi-val{font-size:18px;font-weight:600;color:var(--text);line-height:1.1}
.kpi.accent .kpi-val{color:var(--green)}.kpi.warn .kpi-val{color:var(--amber)}.kpi.danger .kpi-val{color:var(--red)}.kpi.info .kpi-val{color:var(--blue)}
.kpi-sub{font-size:11px;color:var(--text3);margin-top:3px}
.card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:16px 18px;margin-bottom:14px}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.card-title{font-size:13px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:7px}
.card-title i{font-size:15px;color:var(--text2)}
.section-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.7px;color:var(--text2);margin:20px 0 10px;display:flex;align-items:center;gap:8px}
.section-label::after{content:'';flex:1;height:0.5px;background:var(--border)}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;padding:7px 8px;color:var(--text2);font-weight:600;border-bottom:0.5px solid var(--border);white-space:nowrap;font-size:10px;text-transform:uppercase;letter-spacing:.5px}
td{padding:6px 8px;border-bottom:0.5px solid var(--border)}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg2)}
td.r{text-align:right;font-variant-numeric:tabular-nums}
.c-g{color:var(--green)}.c-o{color:var(--amber)}.c-r{color:var(--red)}.c-b{color:var(--blue)}
input[type=number],input[type=text]{width:100%;padding:5px 7px;font-size:12px;border:0.5px solid var(--border2);border-radius:6px;background:var(--bg);color:var(--text);text-align:right;outline:none;font-family:inherit}
input[type=number]:focus,input[type=text]:focus{border-color:var(--accent);box-shadow:0 0 0 2px rgba(99,153,34,.15)}
.pill{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
.pill-g{background:var(--green-bg);color:var(--green)}.pill-o{background:var(--amber-bg);color:var(--amber)}
.pill-r{background:var(--red-bg);color:var(--red)}.pill-t{background:var(--teal-bg);color:var(--teal)}
.pill-p{background:var(--purple-bg);color:var(--purple)}.pill-b{background:var(--blue-bg);color:var(--blue)}
.mot-card{border-radius:var(--radius-lg);padding:14px 16px;margin-bottom:14px;border-left:3px solid;display:flex;gap:12px;align-items:flex-start}
.mot-ruim{background:var(--red-bg);border-color:#E24B4A}.mot-ok{background:var(--amber-bg);border-color:#EF9F27}
.mot-bom{background:var(--green-bg);border-color:#639922}.mot-excel{background:var(--teal-bg);border-color:#1D9E75}
.mot-extra{background:var(--purple-bg);border-color:#7F77DD}
.mot-icon{font-size:22px;flex-shrink:0;margin-top:1px}
.mot-ruim .mot-icon,.mot-ruim .mot-title{color:var(--red)}.mot-ok .mot-icon,.mot-ok .mot-title{color:var(--amber)}
.mot-bom .mot-icon,.mot-bom .mot-title{color:var(--green)}.mot-excel .mot-icon,.mot-excel .mot-title{color:var(--teal)}
.mot-extra .mot-icon,.mot-extra .mot-title{color:var(--purple)}
.mot-title{font-size:13px;font-weight:600;margin-bottom:3px}
.mot-body{font-size:12px;line-height:1.65;color:var(--text2)}
.prog-wrap{height:6px;background:var(--border);border-radius:3px;overflow:hidden;margin:6px 0 2px}
.prog-fill{height:100%;border-radius:3px;transition:width .4s}
.week-mini{background:var(--bg2);border-radius:var(--radius);padding:10px 12px}
.week-mini-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text2);margin-bottom:3px}
.week-mini-val{font-size:14px;font-weight:600;color:var(--text)}
.week-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px}
@media(max-width:640px){.week-grid{grid-template-columns:repeat(2,minmax(0,1fr))}}
.sim-result-big{text-align:center;padding:22px;background:var(--bg2);border-radius:var(--radius-lg);margin-bottom:14px}
.sim-result-big-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--text2);margin-bottom:6px}
.sim-result-big-val{font-size:34px;font-weight:700;color:var(--green)}
.sim-result-big-sub{font-size:12px;color:var(--text2);margin-top:5px}
.tier-row{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:0.5px solid var(--border);font-size:13px}
.tier-row:last-child{border-bottom:none}
.tier-meta{color:var(--text2);display:flex;align-items:center;gap:5px}
.tier-bonus{font-weight:600;color:var(--green)}
.cfg-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:0.5px solid var(--border);gap:12px}
.cfg-row:last-child{border-bottom:none}
.cfg-left{font-size:13px;color:var(--text);font-weight:500}
.cfg-left-sub{font-size:11px;color:var(--text2);margin-top:2px}
.cfg-right{display:flex;align-items:center;gap:6px;flex-shrink:0}
.cfg-right input{width:100px;padding:6px 8px;font-size:13px;text-align:right;border:0.5px solid var(--border2);border-radius:6px;background:var(--bg);color:var(--text);outline:none;font-family:inherit}
.cfg-right input:focus{border-color:var(--accent)}
.cfg-right span{font-size:12px;color:var(--text2)}
.bonus-level{display:grid;grid-template-columns:1fr 1fr 32px;gap:8px;align-items:center;margin-bottom:8px}
.bonus-level input{padding:7px 8px;font-size:13px;border:0.5px solid var(--border2);border-radius:6px;background:var(--bg);color:var(--text);outline:none;text-align:right;width:100%;font-family:inherit}
.bonus-level input:focus{border-color:var(--accent)}
.del-btn{width:30px;height:30px;border:0.5px solid var(--border2);border-radius:6px;background:none;cursor:pointer;color:var(--text2);display:flex;align-items:center;justify-content:center;font-size:14px}
.del-btn:hover{background:var(--red-bg);border-color:var(--red-border);color:var(--red)}
.add-btn{width:100%;padding:9px;border:0.5px dashed var(--border2);border-radius:var(--radius);background:none;font-size:12px;color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;margin-top:6px;font-family:inherit}
.add-btn:hover{background:var(--bg2)}
.chart-wrap{position:relative;width:100%;height:180px;margin-top:14px}
.divider{height:0.5px;background:var(--border);margin:16px 0}
.sim-input-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.sim-input-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:14px}
.sim-input-label{font-size:12px;color:var(--text2);margin-bottom:5px;font-weight:500}
.sim-input input{width:100%;padding:10px 12px;font-size:16px;font-weight:600;border:0.5px solid var(--border2);border-radius:var(--radius);background:var(--bg);color:var(--text);outline:none;text-align:center;font-family:inherit}
.sim-input input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(99,153,34,.12)}
.overflow-x{overflow-x:auto}
.empty-state{text-align:center;padding:28px 20px;color:var(--text2)}
.empty-state i{font-size:28px;display:block;margin-bottom:8px;opacity:.4}
.total-block{background:var(--bg2);border-radius:var(--radius-lg);padding:16px;margin-bottom:12px}
.gastos-row{display:grid;grid-template-columns:1fr auto 32px;gap:8px;align-items:center;margin-bottom:8px}
.gastos-row input{padding:6px 8px;font-size:13px;border:0.5px solid var(--border2);border-radius:6px;background:var(--bg);color:var(--text);outline:none;font-family:inherit}
.gastos-row input:first-child{text-align:left}
.gastos-row input:nth-child(2){text-align:right;width:130px}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="header-left">
      <div class="logo"><i class="ti ti-chart-line"></i></div>
      <div>
        <h1>Painel Financeiro</h1>
        <div class="header-sub" id="headerSub">Mês atual · Nenhum dado lançado</div>
      </div>
    </div>
  </div>

  <div class="nav">
    <button class="nav-btn active" onclick="show('dias',this)"><i class="ti ti-calendar"></i>Dias</button>
    <button class="nav-btn" onclick="show('semanas',this)"><i class="ti ti-layout-columns"></i>Semanas</button>
    <button class="nav-btn" onclick="show('total',this)"><i class="ti ti-chart-bar"></i>Total</button>
    <button class="nav-btn" onclick="show('simulacao',this)"><i class="ti ti-calculator"></i>Simulação</button>
    <button class="nav-btn" onclick="show('comissao',this)"><i class="ti ti-user"></i>Atendente</button>
    <button class="nav-btn" onclick="show('config',this)"><i class="ti ti-settings"></i>Config.</button>
  </div>

  <div id="s-dias" class="section active"></div>
  <div id="s-semanas" class="section"></div>
  <div id="s-total" class="section"></div>
  <div id="s-simulacao" class="section"></div>
  <div id="s-comissao" class="section"></div>
  <div id="s-config" class="section"></div>
</div>

<script>
// ── STORAGE ──────────────────────────────────────────
const SK={dias:'pf_dias',cfg:'pf_cfg',gastos:'pf_gastos'};
function salvar(){try{localStorage.setItem(SK.dias,JSON.stringify(dias));localStorage.setItem(SK.cfg,JSON.stringify(cfg));localStorage.setItem(SK.gastos,JSON.stringify(gastos));}catch(e){}}
function carregar(){
  try{
    const d=localStorage.getItem(SK.dias),c=localStorage.getItem(SK.cfg),g=localStorage.getItem(SK.gastos);
    if(d){const p=JSON.parse(d);if(Array.isArray(p))dias=p;}
    if(c){const p=JSON.parse(c);if(p&&typeof p==='object')cfg=p;}
    if(g){const p=JSON.parse(g);if(Array.isArray(p))gastos=p;}
  }catch(e){}
}

// ── ESTADO ───────────────────────────────────────────
let cfg={fixo:800,commPct:5,frustPct:80,taxPct:13,niveis:[{meta:3000,bonus:50},{meta:4000,bonus:100},{meta:5000,bonus:200}]};
let dias=Array.from({length:31},(_,i)=>({dia:i+1,inv:0,fat:0,leads:0,vendas:0}));
let gastos=[];
let chartInst=null;

carregar();

// ── HELPERS ──────────────────────────────────────────
const brl=v=>'R$ '+v.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
const num=v=>parseFloat(v)||0;
const getFrust=()=>cfg.frustPct/100;
const getTax=()=>cfg.taxPct/100;
const roiX=v=>v.toFixed(2)+'x';

function bonusDia(fat){
  const s=[...cfg.niveis].sort((a,b)=>b.meta-a.meta);
  for(const n of s)if(fat>=n.meta)return n.bonus;
  return 0;
}

function getStatus(fat){
  if(!fat)return null;
  const s=[...cfg.niveis].sort((a,b)=>a.meta-b.meta);
  const[m1,m2,m3]=[s[0]?.meta||3000,s[1]?.meta||4000,s[2]?.meta||5000];
  if(fat<m1)return'ruim';if(fat<m2)return'ok';if(fat<m3)return'bom';
  return fat>m3?'extra':'excel';
}

const ST={
  ruim:{pill:'pill-r',icon:'ti-mood-sad',mot:'mot-ruim',emoji:'😔',label:'Abaixo da meta',
    title:'Abaixo da meta de hoje',
    msg:(fat)=>{const min=[...cfg.niveis].sort((a,b)=>a.meta-b.meta)[0]?.meta||3000;return`Você fez ${brl(fat)} hoje — faltou ${brl(min-fat)} pra bater a meta mínima de ${brl(min)}. Amanhã é uma nova chance! 💪`;}},
  ok:{pill:'pill-o',icon:'ti-mood-smile',mot:'mot-ok',emoji:'👍',label:'Meta mínima',
    title:'Meta mínima atingida!',
    msg:(fat)=>{const ns=[...cfg.niveis].sort((a,b)=>a.meta-b.meta);const next=ns[1]?.meta||4000;return`Boa! ${brl(fat)} hoje. Faltou só ${brl(next-fat)} pra subir de nível. Vai por mais amanhã! 🔥`;}},
  bom:{pill:'pill-g',icon:'ti-flame',mot:'mot-bom',emoji:'🔥',label:'Bom resultado',
    title:'Bom resultado hoje!',
    msg:(fat)=>{const ns=[...cfg.niveis].sort((a,b)=>a.meta-b.meta);const top=ns[ns.length-1]?.meta||5000;return`Excelente! ${brl(fat)} hoje. Só mais ${brl(top-fat)} pra meta máxima. Vai com tudo! 🚀`;}},
  excel:{pill:'pill-t',icon:'ti-rocket',mot:'mot-excel',emoji:'🚀',label:'Excelente!',
    title:'Meta máxima batida!',
    msg:(fat)=>`Incrível! ${brl(fat)} hoje — meta máxima batida! Parabéns, continue assim! 🏆`},
  extra:{pill:'pill-p',icon:'ti-star',mot:'mot-extra',emoji:'🏆',label:'Extraordinário!',
    title:'Extraordinário! Você arrasou!',
    msg:(fat)=>`VOCÊ É FODA! ${brl(fat)} hoje — superou todas as metas! Isso é resultado de elite. ⭐`}
};

function pillHtml(fat){
  const s=getStatus(fat);if(!s)return'';
  return`<span class="pill ${ST[s].pill}">${ST[s].emoji} ${ST[s].label}</span>`;
}

// ── DIAS ─────────────────────────────────────────────
function renderDias(){
  const el=document.getElementById('s-dias');
  const totFat=dias.reduce((a,d)=>a+d.fat,0);
  const totInv=dias.reduce((a,d)=>a+d.inv,0);
  const totInvT=totInv*(1+getTax());
  const totFrust=totFat*getFrust();
  const diasN=dias.filter(d=>d.fat>0||d.inv>0).length;

  const kpi=`<div class="kpi-grid">
    <div class="kpi${totFat>0?' accent':''}">
      <div class="kpi-label">Faturado</div>
      <div class="kpi-val">${totFat?brl(totFat):'—'}</div>
      <div class="kpi-sub">${diasN} dia${diasN!==1?'s':''} lançado${diasN!==1?'s':''}</div>
    </div>
    <div class="kpi${totInv>0?' warn':''}">
      <div class="kpi-label">Investido +${cfg.taxPct}%</div>
      <div class="kpi-val">${totInv?brl(totInvT):'—'}</div>
      <div class="kpi-sub">Imposto incluso</div>
    </div>
    <div class="kpi${totFat>0?((totFrust-totInvT)>=0?' accent':' danger'):''}">
      <div class="kpi-label">Lucro líquido</div>
      <div class="kpi-val">${totFat||totInv?brl(totFrust-totInvT):'—'}</div>
      <div class="kpi-sub">Frustração − investimento</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">ROI</div>
      <div class="kpi-val">${totInvT>0?roiX(totFat/totInvT):'—'}</div>
      <div class="kpi-sub">Faturado ÷ investido</div>
    </div>
  </div>`;

  const rows=dias.map(d=>{
    const invT=d.inv*(1+getTax()),lucro=d.fat-invT,frust=d.fat*getFrust(),lucroF=frust-invT;
    const roi=d.inv>0?d.fat/(d.inv*(1+getTax())):null;
    return`<tr>
      <td style="font-weight:600;color:var(--text2);width:30px">${d.dia}</td>
      <td><input type="number" min="0" step="0.01" value="${d.inv||''}" placeholder="0,00" onchange="upd(${d.dia-1},'inv',this.value)"></td>
      <td><input type="number" min="0" step="0.01" value="${d.fat||''}" placeholder="0,00" onchange="upd(${d.dia-1},'fat',this.value)"></td>
      <td><input type="number" min="0" step="1" value="${d.leads||''}" placeholder="0" onchange="upd(${d.dia-1},'leads',this.value)"></td>
      <td><input type="number" min="0" step="1" value="${d.vendas||''}" placeholder="0" onchange="upd(${d.dia-1},'vendas',this.value)"></td>
      <td class="r c-g">${d.fat?brl(d.fat):'—'}</td>
      <td class="r ${lucro>0?'c-g':lucro<0?'c-r':''}">${d.fat||d.inv?brl(lucro):'—'}</td>
      <td class="r ${lucroF>0?'c-g':lucroF<0?'c-r':''}">${d.fat||d.inv?brl(lucroF):'—'}</td>
      <td class="r">${roi!==null?roiX(roi):'—'} ${d.fat?pillHtml(d.fat):''}</td>
    </tr>`;
  }).join('');

  el.innerHTML=kpi+`<div class="card">
    <div class="card-header"><div class="card-title"><i class="ti ti-table"></i>Lançamento diário</div></div>
    <div class="overflow-x"><table>
      <thead><tr><th>Dia</th><th>Inv. tráfego</th><th>Faturado</th><th>Leads</th><th>Vendas</th><th>Faturamento 100%</th><th>Lucro 100%</th><th>Lucro líquido</th><th>ROI</th></tr></thead>
      <tbody>${rows}</tbody>
    </table></div>
  </div>`;
  updateHeader();
}

// ── SEMANAS ──────────────────────────────────────────
function calcSem(i){
  const f=[[0,7],[7,14],[14,21],[21,31]];
  const dd=dias.slice(...f[i]);
  const fat=dd.reduce((a,d)=>a+d.fat,0),inv=dd.reduce((a,d)=>a+d.inv,0);
  const invT=inv*(1+getTax()),frust=fat*getFrust();
  return{fat,inv,invT,frust,lucro:fat-invT,lucroLiq:frust-invT,
    roiFat:invT>0?fat/invT:null,roiFrust:invT>0?frust/invT:null,
    vendas:dd.reduce((a,d)=>a+d.vendas,0),leads:dd.reduce((a,d)=>a+d.leads,0)};
}

function renderSemanas(){
  const el=document.getElementById('s-semanas');
  const ranges=['1 a 7','8 a 14','15 a 21','22 a 31'];
  el.innerHTML=Array.from({length:4},(_,i)=>{
    const c=calcSem(i),h=c.fat>0||c.inv>0;
    return`<div class="card">

}

      <span style="display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text2)"><span style="width:12px;height:2px;border-top:2px dashed #185FA5;display:inline-block"></span>Lucro líquido</span>

// ── GASTOS ───────────────────────────────────────────
function renderGastos(){
  const el=document.getElementById('gastosLista');if(!el)return;
  if(gastos.length===0){el.innerHTML=`<div style="font-size:12px;color:var(--text3);margin-bottom:8px">Nenhum gasto adicionado.</div>`;return;}
  el.innerHTML=gastos.map((g,i)=>`
  <div class="gastos-row">
    <input type="text" value="${g.nome}" placeholder="Descrição (ex: Aluguel)" oninput="gastos[${i}].nome=this.value;salvar();renderTotalGastos()">
    <input type="number" min="0" step="0.01" value="${g.valor||''}" placeholder="0,00" oninput="gastos[${i}].valor=num(this.value);salvar();renderTotalGastos()">
    <button class="del-btn" onclick="gastos.splice(${i},1);salvar();renderTotal()"><i class="ti ti-x"></i></button>
  </div>`).join('');
}

function renderTotalGastos(){
  salvar();
  const totalGastos=gastos.reduce((a,g)=>a+g.valor,0);
  const fat=dias.reduce((a,d)=>a+d.fat,0),inv=dias.reduce((a,d)=>a+d.inv,0);
  const invT=inv*(1+getTax()),frust=fat*getFrust(),lucroLiq=frust-invT;
  const el=document.querySelector('#s-total .c-gastos-total');
  if(el)el.textContent=brl(totalGastos);
}

function addGasto(){gastos.push({nome:'',valor:0});salvar();renderTotal();}

  el.innerHTML=`
  <div class="section-label">Simulação de ganhos</div>
  <div class="card">
    <div class="card-header"><div class="card-title"><i class="ti ti-calculator"></i>Parâmetros da simulação</div></div>

    </div>
  </div>
  <div id="simResultado"></div>`;

function calcSim(){
  const ticket=num(document.getElementById('simTicket')?.value);
  const vendas=num(document.getElementById('simVendas')?.value);
  const cpa=num(document.getElementById('simCPA')?.value);
  const cpc=num(document.getElementById('simCPC')?.value);
  const dias_mes=num(document.getElementById('simDiasMes')?.value)||30;
  const nAtend=Math.max(1,num(document.getElementById('simAtend')?.value)||1);
  const txConv=num(document.getElementById('simTxConv')?.value);

  const fatDia=ticket*vendas;
  const fatMes=fatDia*dias_mes;
  const invDia=cpa*vendas;
  const invMes=invDia*dias_mes;
  const invMesT=invMes*(1+getTax());
  const frustMes=fatMes*getFrust();
  const lucroMes=fatMes-invMesT;
  const lucroLiqMes=frustMes-invMesT;
  const roiMes=invMesT>0?fatMes/invMesT:0;
  const leadsNec=txConv>0?(vendas/(txConv/100)):0;
  const custoConvDia=leadsNec*cpc;
  const custoConvMes=custoConvDia*dias_mes;

  // comissão por atendente
  const commPorAtend=frustMes*(cfg.commPct/100);
  const bonusPorAtend=bonusDia(fatDia)*dias_mes;
  const salPorAtend=cfg.fixo+commPorAtend+bonusPorAtend;
  const totalAtend=salPorAtend*nAtend;
  const lucroLiqFinal=lucroLiqMes-totalAtend;
  const totalGastosMes=gastos.reduce((a,g)=>a+g.valor,0);
  const lucroReal=lucroLiqFinal-totalGastosMes;

  const el=document.getElementById('simResultado');if(!el)return;
  el.innerHTML=`
  <div class="section-label">Resultado projetado — mês</div>
  <div class="total-block">
    <div class="kpi-grid" style="margin-bottom:10px">
      <div class="kpi accent"><div class="kpi-label">Faturamento</div><div class="kpi-val">${brl(fatMes)}</div><div class="kpi-sub">${brl(fatDia)}/dia</div></div>
      <div class="kpi warn"><div class="kpi-label">Investimento +${cfg.taxPct}%</div><div class="kpi-val">${brl(invMesT)}</div><div class="kpi-sub">Bruto: ${brl(invMes)}</div></div>
      <div class="kpi ${lucroMes>=0?'accent':'danger'}"><div class="kpi-label">Lucro 100%</div><div class="kpi-val">${brl(lucroMes)}</div></div>
      <div class="kpi"><div class="kpi-label">Frustração ${cfg.frustPct}%</div><div class="kpi-val" style="color:var(--amber)">${brl(frustMes)}</div></div>
    </div>
    <div class="kpi-grid">
      <div class="kpi ${lucroLiqMes>=0?'accent':'danger'}"><div class="kpi-label">Lucro líquido</div><div class="kpi-val">${brl(lucroLiqMes)}</div></div>
      <div class="kpi"><div class="kpi-label">ROI</div><div class="kpi-val">${roiX(roiMes)}</div></div>
      <div class="kpi info"><div class="kpi-label">Ticket médio</div><div class="kpi-val">${brl(ticket)}</div></div>
      <div class="kpi info"><div class="kpi-label">Total vendas</div><div class="kpi-val">${(vendas*dias_mes).toFixed(0)}</div></div>
    </div>
  </div>

  <div class="section-label">Métricas de tráfego</div>
  <div class="kpi-grid-5" style="margin-bottom:14px">
    <div class="kpi info"><div class="kpi-label">CPA</div><div class="kpi-val">${brl(cpa)}</div><div class="kpi-sub">Custo por venda</div></div>
    <div class="kpi info"><div class="kpi-label">Custo/conversa</div><div class="kpi-val">${brl(cpc)}</div></div>
    <div class="kpi"><div class="kpi-label">Leads necessários/dia</div><div class="kpi-val">${leadsNec>0?leadsNec.toFixed(0):'—'}</div><div class="kpi-sub">Tx conv: ${txConv}%</div></div>
    <div class="kpi"><div class="kpi-label">Custo conversas/dia</div><div class="kpi-val">${brl(custoConvDia)}</div></div>
    <div class="kpi"><div class="kpi-label">Custo conversas/mês</div><div class="kpi-val">${brl(custoConvMes)}</div></div>
  </div>

  <div class="section-label">Custo com atendente${nAtend>1?'s':''}</div>
  <div class="card">
    <div class="kpi-grid" style="margin-bottom:10px">
      <div class="kpi"><div class="kpi-label">Fixo por atendente</div><div class="kpi-val">${brl(cfg.fixo)}</div></div>
      <div class="kpi accent"><div class="kpi-label">Comissão por atendente</div><div class="kpi-val">${brl(commPorAtend)}</div><div class="kpi-sub">${cfg.commPct}% sobre ${cfg.frustPct}%</div></div>
      <div class="kpi warn"><div class="kpi-label">Bônus por atendente</div><div class="kpi-val">${brl(bonusPorAtend)}</div></div>
      <div class="kpi"><div class="kpi-label">Salário por atendente</div><div class="kpi-val">${brl(salPorAtend)}</div></div>
    </div>
    <div style="padding:12px;background:var(--red-bg);border-radius:var(--radius);display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <span style="font-size:13px;font-weight:600;color:var(--red)">${nAtend} atendente${nAtend>1?'s':''} — custo total</span>
      <span style="font-size:18px;font-weight:700;color:var(--red)">${brl(totalAtend)}</span>
    </div>
    ${totalGastosMes>0?`<div style="padding:12px;background:var(--amber-bg);border-radius:var(--radius);display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <span style="font-size:13px;font-weight:600;color:var(--amber)">Outros gastos do mês</span>
      <span style="font-size:16px;font-weight:700;color:var(--amber)">${brl(totalGastosMes)}</span>
    </div>`:''}
    <div style="padding:14px;background:var(--green-bg);border-radius:var(--radius);display:flex;justify-content:space-between;align-items:center">
      <div>
        <div style="font-size:13px;font-weight:600;color:var(--green)">Lucro real após todos os custos</div>
        <div style="font-size:11px;color:var(--green);margin-top:2px">Lucro líquido − atendentes − outros gastos</div>
      </div>
      <span style="font-size:22px;font-weight:700;color:var(--green)">${brl(lucroReal)}</span>
    </div>
  </div>`;
}

// ── ATENDENTE ────────────────────────────────────────
function renderComissao(){
  const el=document.getElementById('s-comissao');
  const fatTotal=dias.reduce((a,d)=>a+d.fat,0);
  const frust=fatTotal*getFrust();
  const commFixa=frust*(cfg.commPct/100);
  const bonusDias=dias.map(d=>({dia:d.dia,fat:d.fat,b:bonusDia(d.fat)}));
  const totalBonus=bonusDias.reduce((a,d)=>a+d.b,0);
  const totalSalario=cfg.fixo+commFixa+totalBonus;
  const h=fatTotal>0;

  const ultimoDia=dias.filter(d=>d.fat>0).slice(-1)[0];
  let motHtml='';
  if(ultimoDia){
    const s=getStatus(ultimoDia.fat);
    if(s){
      const info=ST[s];
      const maxMeta=cfg.niveis.length?Math.max(...cfg.niveis.map(n=>n.meta)):5000;
      const fillPct=Math.min(100,(ultimoDia.fat/maxMeta)*100);
      const fc={ruim:'#E24B4A',ok:'#EF9F27',bom:'#639922',excel:'#1D9E75',extra:'#7F77DD'}[s];
      motHtml=`<div class="mot-card ${info.mot}">
        <i class="ti ${info.icon} mot-icon"></i>
        <div style="flex:1">
          <div class="mot-title">${info.title}</div>
          <div class="mot-body">${info.msg(ultimoDia.fat)}</div>
          <div style="margin-top:8px">
            <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--text2);margin-bottom:3px"><span>Progresso hoje</span><span>${brl(ultimoDia.fat)} / ${brl(maxMeta)}</span></div>
            <div class="prog-wrap"><div class="prog-fill" style="width:${fillPct}%;background:${fc}"></div></div>
          </div>
        </div>
      </div>`;
    }
  }

  let tRows=bonusDias.filter(d=>d.fat>0).map(d=>{
    const s=getStatus(d.fat);
    return`<tr>
      <td>Dia ${d.dia} ${s?`<span class="pill ${ST[s].pill}" style="margin-left:4px">${ST[s].emoji}</span>`:''}</td>
      <td class="r">${brl(d.fat)}</td>
      <td class="r ${d.b>0?'c-g':''}">${d.b>0?brl(d.b):'—'}</td>
    </tr>`;
  }).join('');
  if(!tRows)tRows=`<tr><td colspan="3"><div class="empty-state"><i class="ti ti-calendar-off"></i>Nenhuma venda lançada ainda</div></td></tr>`;

  el.innerHTML=`${motHtml}
  <div class="kpi-grid">
    <div class="kpi"><div class="kpi-label">Salário fixo</div><div class="kpi-val">${brl(cfg.fixo)}</div><div class="kpi-sub">Todo mês</div></div>
    <div class="kpi${h?' accent':''}"><div class="kpi-label">Comissão ${cfg.commPct}%</div><div class="kpi-val">${h?brl(commFixa):'—'}</div><div class="kpi-sub">Sobre ${cfg.frustPct}% do fat.</div></div>
    <div class="kpi${h?' warn':''}"><div class="kpi-label">Bônus acumulado</div><div class="kpi-val">${h?brl(totalBonus):'—'}</div><div class="kpi-sub">Por metas diárias</div></div>
    <div class="kpi${h?' accent':''}"><div class="kpi-label">Salário total</div><div class="kpi-val">${brl(totalSalario)}</div><div class="kpi-sub">Estimativa do mês</div></div>
  </div>
  <div class="card">
    <div class="card-header"><div class="card-title"><i class="ti ti-receipt"></i>Bônus por dia</div></div>
    <table><thead><tr><th>Dia</th><th>Faturado</th><th>Bônus</th></tr></thead><tbody>${tRows}</tbody></table>
  </div>
  <div class="section-label">Simulador de ganhos</div>
  <div class="card">
    <div class="card-header"><div class="card-title"><i class="ti ti-calculator"></i>Se eu fizer esse tanto por dia...</div></div>
    <div class="sim-input-row">
      <div class="sim-input"><div class="sim-input-label">Faturamento por dia (R$)</div><input type="number" id="simFat" min="0" step="100" value="4000" oninput="atualizaSim()"></div>
      <div class="sim-input"><div class="sim-input-label">Dias no mês</div><input type="number" id="simDias" min="1" max="31" value="30" oninput="atualizaSim()"></div>
    </div>
    <div id="simResult"></div>
    <div class="divider"></div>
    <div style="font-size:12px;font-weight:600;color:var(--text2);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px">Tabela de bônus</div>
    ${[...cfg.niveis].sort((a,b)=>a.meta-b.meta).map(n=>`
    <div class="tier-row">
      <span class="tier-meta"><i class="ti ti-target" style="font-size:13px"></i>Faturar ≥ ${brl(n.meta)} no dia</span>
      <span class="tier-bonus">+ ${brl(n.bonus)} de bônus</span>
    </div>`).join('')}
  </div>`;
  atualizaSim();
}

function atualizaSim(){
  const fatDia=num(document.getElementById('simFat')?.value);
  const diasR=num(document.getElementById('simDias')?.value)||30;
  const projFat=fatDia*diasR;
  const projFrust=projFat*getFrust();
  const projComm=projFrust*(cfg.commPct/100);
  const projBonus=bonusDia(fatDia)*diasR;
  const projTotal=cfg.fixo+projComm+projBonus;
  const s=getStatus(fatDia);
  const maxMeta=cfg.niveis.length?Math.max(...cfg.niveis.map(n=>n.meta)):5000;
  const fillPct=Math.min(100,(fatDia/maxMeta)*100);
  const fc={ruim:'#E24B4A',ok:'#EF9F27',bom:'#639922',excel:'#1D9E75',extra:'#7F77DD'};
  const fillColor=s?fc[s]:'#888780';
  const el=document.getElementById('simResult');if(!el)return;
  el.innerHTML=`
  <div style="margin-bottom:14px">
    <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--text2);margin-bottom:4px"><span>${brl(fatDia)}/dia</span><span>Meta máx: ${brl(maxMeta)}</span></div>
    <div class="prog-wrap" style="height:8px"><div class="prog-fill" style="width:${fillPct}%;background:${fillColor}"></div></div>
    ${s?`<div style="margin-top:6px"><span class="pill ${ST[s].pill}">${ST[s].emoji} ${ST[s].label}</span></div>`:''}
  </div>
  <div class="sim-result-big">
    <div class="sim-result-big-label">Projeção de salário no mês</div>
    <div class="sim-result-big-val">${brl(projTotal)}</div>
    <div class="sim-result-big-sub">Fixo ${brl(cfg.fixo)} + Comissão ${brl(projComm)} + Bônus ${brl(projBonus)}</div>
  </div>
  <div style="display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px">
    <div class="week-mini"><div class="week-mini-label">Bônus por dia</div><div class="week-mini-val ${bonusDia(fatDia)>0?'c-g':''}">${bonusDia(fatDia)?brl(bonusDia(fatDia)):'Sem bônus'}</div></div>
    <div class="week-mini"><div class="week-mini-label">Fat. simulado</div><div class="week-mini-val">${brl(projFat)}</div></div>
    <div class="week-mini"><div class="week-mini-label">Frustração sim.</div><div class="week-mini-val c-o">${brl(projFrust)}</div></div>
  </div>`;
}

// ── CONFIG ───────────────────────────────────────────
function renderConfig(){
  const el=document.getElementById('s-config');
  el.innerHTML=`<div class="section-label">Configurações gerais</div>
  <div class="card">
    <div class="cfg-row">
      <div><div class="cfg-left">Salário fixo mensal</div><div class="cfg-left-sub">Valor garantido todo mês</div></div>
      <div class="cfg-right"><span>R$</span><input type="number" min="0" step="50" value="${cfg.fixo}" onchange="cfg.fixo=num(this.value);salvar();refreshAll()"></div>
    </div>
    <div class="cfg-row">
      <div><div class="cfg-left">Comissão sobre faturamento</div><div class="cfg-left-sub">% sobre a frustração do faturamento</div></div>
      <div class="cfg-right"><input type="number" min="0" step="0.5" value="${cfg.commPct}" onchange="cfg.commPct=num(this.value);salvar();refreshAll()"><span>%</span></div>
    </div>
    <div class="cfg-row">
      <div><div class="cfg-left">Frustração (pedidos não pagos)</div><div class="cfg-left-sub">% do faturamento efetivamente recebido</div></div>
      <div class="cfg-right"><input type="number" min="0" max="100" step="1" value="${cfg.frustPct}" onchange="cfg.frustPct=num(this.value);salvar();refreshAll()"><span>%</span></div>
    </div>
    <div class="cfg-row">
      <div><div class="cfg-left">Imposto sobre investimento</div><div class="cfg-left-sub">% adicionado ao investimento em tráfego</div></div>
      <div class="cfg-right"><input type="number" min="0" max="100" step="1" value="${cfg.taxPct}" onchange="cfg.taxPct=num(this.value);salvar();refreshAll()"><span>%</span></div>
    </div>
  </div>
  <div class="section-label">Níveis de bônus por faturamento diário</div>
  <div class="card">
    <div style="display:grid;grid-template-columns:1fr 1fr 32px;gap:8px;margin-bottom:8px">
      <div style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text2)">Venda mínima no dia</div>
      <div style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text2)">Bônus a receber</div>
      <div></div>
    </div>
    ${cfg.niveis.map((n,i)=>`<div class="bonus-level">
      <input type="number" min="0" step="100" value="${n.meta}" placeholder="Ex: 3000" onchange="cfg.niveis[${i}].meta=num(this.value);salvar();refreshAll()">
      <input type="number" min="0" step="10" value="${n.bonus}" placeholder="Ex: 50" onchange="cfg.niveis[${i}].bonus=num(this.value);salvar();refreshAll()">
      <button class="del-btn" onclick="cfg.niveis.splice(${i},1);salvar();refreshAll()"><i class="ti ti-x"></i></button>
    </div>`).join('')}
    <button class="add-btn" onclick="cfg.niveis.push({meta:0,bonus:0});salvar();renderConfig()"><i class="ti ti-plus"></i>Adicionar nível</button>
  </div>`;
}

// ── UTILS ────────────────────────────────────────────
function updateHeader(){
  const fat=dias.reduce((a,d)=>a+d.fat,0);
  const n=dias.filter(d=>d.fat>0||d.inv>0).length;
  const el=document.getElementById('headerSub');if(!el)return;
  el.textContent=fat>0?`Faturamento acumulado: ${brl(fat)} · ${n} dia${n!==1?'s':''} lançado${n!==1?'s':''}`:'Mês atual · Nenhum dado lançado';
}

function upd(i,f,v){dias[i][f]=num(v);salvar();refreshAll();}

function show(name,btn){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('s-'+name).classList.add('active');
  btn.classList.add('active');
  if(name==='total')renderTotal();
  if(name==='comissao')renderComissao();
  if(name==='simulacao')renderSimulacao();
}

function refreshAll(){
  const active=document.querySelector('.section.active')?.id;
  renderDias();renderSemanas();renderConfig();
  if(active==='s-total')renderTotal();
  if(active==='s-comissao')renderComissao();
  if(active==='s-simulacao')renderSimulacao();
  updateHeader();
}

renderDias();renderSemanas();renderConfig();
</script>
</body>
</html>
